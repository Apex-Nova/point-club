services:
  - type: web
    name: point-club-backend
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: FRONTEND_URL
        sync: false   # set this in Render dashboard to your Vercel URL
    healthCheckPath: /health
