<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1200" viewBox="0 0 800 1200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="1200" fill="url(#bg)"/>
  <circle cx="150" cy="300" r="250" fill="#7c3aed" opacity="0.14"/>
  <circle cx="700" cy="900" r="280" fill="#e11d48" opacity="0.11"/>

  <!-- Title -->
  <text x="400" y="120" text-anchor="middle" font-family="Arial Black" font-weight="900" font-size="76" fill="white" filter="url(#glow)">POINT CLUB</text>
  <text x="400" y="168" text-anchor="middle" font-family="Arial" font-size="22" fill="rgba(255,255,255,0.4)" letter-spacing="7">DRAW &amp; GUESS</text>
  <line x1="100" y1="192" x2="700" y2="192" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Canvas -->
  <rect x="50" y="210" width="700" height="560" rx="16" fill="white" opacity="0.97"/>

  <!-- Sun drawing -->
  <circle cx="230" cy="430" r="75" fill="none" stroke="#f59e0b" stroke-width="9"/>
  <line x1="230" y1="330" x2="230" y2="308" stroke="#f59e0b" stroke-width="8" stroke-linecap="round"/>
  <line x1="230" y1="530" x2="230" y2="552" stroke="#f59e0b" stroke-width="8" stroke-linecap="round"/>
  <line x1="130" y1="430" x2="108" y2="430" stroke="#f59e0b" stroke-width="8" stroke-linecap="round"/>
  <line x1="330" y1="430" x2="352" y2="430" stroke="#f59e0b" stroke-width="8" stroke-linecap="round"/>
  <line x1="159" y1="359" x2="143" y2="343" stroke="#f59e0b" stroke-width="8" stroke-linecap="round"/>
  <line x1="301" y1="501" x2="317" y2="517" stroke="#f59e0b" stroke-width="8" stroke-linecap="round"/>
  <line x1="301" y1="359" x2="317" y2="343" stroke="#f59e0b" stroke-width="8" stroke-linecap="round"/>
  <line x1="159" y1="501" x2="143" y2="517" stroke="#f59e0b" stroke-width="8" stroke-linecap="round"/>
  <!-- Clouds -->
  <ellipse cx="188" cy="252" rx="48" ry="30" fill="#e5e7eb" opacity="0.85"/>
  <ellipse cx="228" cy="241" rx="38" ry="24" fill="#f3f4f6" opacity="0.9"/>
  <ellipse cx="158" cy="255" rx="30" ry="20" fill="#e5e7eb" opacity="0.8"/>

  <!-- House -->
  <polygon points="480,490 590,370 700,490" fill="#e11d48" opacity="0.9"/>
  <rect x="496" y="490" width="188" height="148" rx="3" fill="#7c3aed" opacity="0.9"/>
  <rect x="558" y="552" width="52" height="86" rx="5" fill="#1a1a2e"/>
  <rect x="510" y="512" width="38" height="38" rx="5" fill="#fbbf24"/>
  <rect x="642" y="512" width="38" height="38" rx="5" fill="#fbbf24"/>
  <!-- Ground -->
  <line x1="68" y1="640" x2="732" y2="640" stroke="#9ca3af" stroke-width="3" opacity="0.25"/>
  <!-- Pencil -->
  <g transform="translate(680,620) rotate(-30)">
    <rect x="-8" y="-52" width="16" height="64" rx="3" fill="#fbbf24"/>
    <polygon points="-8,12 8,12 0,28" fill="#1a1a2e"/>
    <rect x="-8" y="-62" width="16" height="12" rx="2" fill="#f87171"/>
  </g>

  <!-- Word hint bar -->
  <rect x="50" y="166" width="700" height="38" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="140" y="191" font-family="Arial" font-size="12" fill="rgba(255,255,255,0.3)">Round 1/3</text>
  <text x="290" y="193" font-family="Arial Black" font-size="15" fill="white" letter-spacing="11">_ _ _ _ _</text>
  <text x="648" y="191" font-family="Arial" font-size="13" fill="#f59e0b" font-weight="bold">⏱ 42s</text>

  <!-- Players -->
  <text x="50" y="830" font-family="Arial" font-size="11" font-weight="bold" fill="rgba(255,255,255,0.3)" letter-spacing="4">PLAYERS</text>
  <rect x="50" y="845" width="700" height="62" rx="14" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <circle cx="94" cy="876" r="22" fill="#7c3aed"/>
  <text x="94" y="884" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="16" fill="white">G</text>
  <text x="128" y="870" font-family="Arial" font-weight="bold" font-size="14" fill="rgba(255,255,255,0.9)">Player1</text>
  <text x="128" y="890" font-family="Arial" font-size="12" fill="rgba(255,255,255,0.4)">350 pts</text>
  <text x="720" y="882" text-anchor="end" font-family="Arial" font-size="20" fill="#f59e0b">🥇</text>

  <rect x="50" y="918" width="700" height="62" rx="14" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
  <circle cx="94" cy="949" r="22" fill="#e11d48"/>
  <text x="94" y="957" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="16" fill="white">P</text>
  <text x="128" y="943" font-family="Arial" font-weight="bold" font-size="14" fill="rgba(255,255,255,0.9)">Player2 ✏️</text>
  <text x="128" y="963" font-family="Arial" font-size="12" fill="rgba(255,255,255,0.4)">Drawing...</text>

  <rect x="50" y="991" width="700" height="62" rx="14" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <circle cx="94" cy="1022" r="22" fill="#059669"/>
  <text x="94" y="1030" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="16" fill="white">A</text>
  <text x="128" y="1016" font-family="Arial" font-weight="bold" font-size="14" fill="rgba(255,255,255,0.9)">Player3</text>
  <text x="128" y="1036" font-family="Arial" font-size="12" fill="#34d399">200 pts ✓</text>

  <!-- CTA -->
  <rect x="225" y="1090" width="350" height="46" rx="23" fill="rgba(124,58,237,0.3)" stroke="rgba(124,58,237,0.6)" stroke-width="1.5"/>
  <text x="400" y="1119" text-anchor="middle" font-family="Arial" font-size="16" fill="#a78bfa" font-weight="bold">✦ FREE TO PLAY ✦</text>
  <text x="400" y="1162" text-anchor="middle" font-family="Arial" font-size="14" fill="rgba(255,255,255,0.2)">point-club.vercel.app</text>
</svg>
