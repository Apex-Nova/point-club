<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- Glow orbs -->
  <circle cx="300" cy="300" r="350" fill="#7c3aed" opacity="0.12"/>
  <circle cx="1620" cy="780" r="400" fill="#e11d48" opacity="0.10"/>
  <circle cx="960" cy="540" r="500" fill="#7c3aed" opacity="0.05"/>

  <!-- Canvas board -->
  <rect x="480" y="160" width="960" height="640" rx="20" fill="white" opacity="0.97"/>
  <rect x="480" y="160" width="960" height="640" rx="20" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>

  <!-- Drawing: Sun -->
  <circle cx="760" cy="380" r="80" fill="none" stroke="#f59e0b" stroke-width="10" stroke-linecap="round"/>
  <line x1="760" y1="270" x2="760" y2="245" stroke="#f59e0b" stroke-width="9" stroke-linecap="round"/>
  <line x1="760" y1="490" x2="760" y2="515" stroke="#f59e0b" stroke-width="9" stroke-linecap="round"/>
  <line x1="650" y1="380" x2="625" y2="380" stroke="#f59e0b" stroke-width="9" stroke-linecap="round"/>
  <line x1="870" y1="380" x2="895" y2="380" stroke="#f59e0b" stroke-width="9" stroke-linecap="round"/>
  <line x1="682" y1="302" x2="664" y2="284" stroke="#f59e0b" stroke-width="9" stroke-linecap="round"/>
  <line x1="838" y1="458" x2="856" y2="476" stroke="#f59e0b" stroke-width="9" stroke-linecap="round"/>
  <line x1="838" y1="302" x2="856" y2="284" stroke="#f59e0b" stroke-width="9" stroke-linecap="round"/>
  <line x1="682" y1="458" x2="664" y2="476" stroke="#f59e0b" stroke-width="9" stroke-linecap="round"/>

  <!-- Drawing: House -->
  <polygon points="1060,480 1180,350 1300,480" fill="#e11d48" opacity="0.9"/>
  <rect x="1075" y="480" width="210" height="170" rx="3" fill="#7c3aed" opacity="0.9"/>
  <rect x="1150" y="545" width="60" height="105" rx="6" fill="#1a1a2e"/>
  <rect x="1090" y="505" width="42" height="42" rx="6" fill="#fbbf24"/>
  <rect x="1228" y="505" width="42" height="42" rx="6" fill="#fbbf24"/>

  <!-- Ground -->
  <line x1="510" y1="650" x2="1410" y2="650" stroke="#9ca3af" stroke-width="4" stroke-linecap="round" opacity="0.3"/>

  <!-- Clouds -->
  <ellipse cx="680" cy="240" rx="55" ry="34" fill="#e5e7eb" opacity="0.8"/>
  <ellipse cx="722" cy="228" rx="44" ry="28" fill="#f3f4f6" opacity="0.9"/>
  <ellipse cx="646" cy="244" rx="34" ry="24" fill="#e5e7eb" opacity="0.8"/>

  <!-- Pencil cursor -->
  <g transform="translate(1260, 590) rotate(-30)">
    <rect x="-9" y="-60" width="18" height="75" rx="4" fill="#fbbf24"/>
    <polygon points="-9,15 9,15 0,33" fill="#1a1a2e"/>
    <rect x="-9" y="-70" width="18" height="12" rx="3" fill="#f87171"/>
  </g>

  <!-- Left: Players panel -->
  <rect x="60" y="200" width="380" height="56" rx="14" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <circle cx="106" cy="228" r="22" fill="#7c3aed"/>
  <text x="106" y="235" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="16" fill="white">G</text>
  <text x="142" y="222" font-family="Arial" font-weight="bold" font-size="14" fill="rgba(255,255,255,0.9)">Player1</text>
  <text x="142" y="241" font-family="Arial" font-size="12" fill="rgba(255,255,255,0.4)">350 pts</text>

  <rect x="60" y="270" width="380" height="56" rx="14" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <circle cx="106" cy="298" r="22" fill="#e11d48"/>
  <text x="106" y="305" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="16" fill="white">P</text>
  <text x="142" y="292" font-family="Arial" font-weight="bold" font-size="14" fill="rgba(255,255,255,0.9)">Player2 ✏️</text>
  <text x="142" y="311" font-family="Arial" font-size="12" fill="rgba(255,255,255,0.4)">0 pts</text>

  <rect x="60" y="340" width="380" height="56" rx="14" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <circle cx="106" cy="368" r="22" fill="#059669"/>
  <text x="106" y="375" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="16" fill="white">A</text>
  <text x="142" y="362" font-family="Arial" font-weight="bold" font-size="14" fill="rgba(255,255,255,0.9)">Player3</text>
  <text x="142" y="381" font-family="Arial" font-size="12" fill="rgba(16,185,129,1)">200 pts ✓</text>

  <rect x="60" y="410" width="380" height="56" rx="14" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <circle cx="106" cy="438" r="22" fill="#f59e0b"/>
  <text x="106" y="445" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="16" fill="white">K</text>
  <text x="142" y="432" font-family="Arial" font-weight="bold" font-size="14" fill="rgba(255,255,255,0.9)">Player4</text>
  <text x="142" y="451" font-family="Arial" font-size="12" fill="rgba(255,255,255,0.4)">175 pts</text>

  <!-- Right: Chat panel -->
  <rect x="1480" y="220" width="380" height="64" rx="14" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="1498" y="244" font-family="Arial" font-size="13" fill="rgba(255,255,255,0.4)">Player1:</text>
  <text x="1498" y="264" font-family="Arial" font-size="15" fill="rgba(255,255,255,0.8)">is it a house? 🏠</text>

  <rect x="1480" y="298" width="380" height="64" rx="14" fill="rgba(16,185,129,0.15)" stroke="rgba(16,185,129,0.35)" stroke-width="1"/>
  <text x="1498" y="322" font-family="Arial" font-size="13" fill="rgba(255,255,255,0.4)">Player3:</text>
  <text x="1498" y="342" font-family="Arial" font-weight="bold" font-size="15" fill="#34d399">✓ Guessed it! +200 pts</text>

  <rect x="1480" y="376" width="380" height="64" rx="14" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="1498" y="400" font-family="Arial" font-size="13" fill="rgba(255,255,255,0.4)">Player1:</text>
  <text x="1498" y="420" font-family="Arial" font-size="15" fill="rgba(255,255,255,0.8)">sunshine?? ☀️</text>

  <!-- Word hint bar -->
  <rect x="480" y="110" width="960" height="44" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="600" y="138" font-family="Arial" font-size="14" fill="rgba(255,255,255,0.3)">Round 1/3</text>
  <text x="810" y="140" font-family="Arial Black" font-size="18" fill="white" letter-spacing="14">_ _ _ _ _</text>
  <text x="1300" y="138" font-family="Arial" font-size="16" fill="#f59e0b" font-weight="bold">⏱ 42s</text>

  <!-- Timer bar -->
  <rect x="480" y="154" width="960" height="5" rx="3" fill="rgba(255,255,255,0.1)"/>
  <rect x="480" y="154" width="520" height="5" rx="3" fill="#f59e0b"/>

  <!-- Main title -->
  <text x="960" y="900" text-anchor="middle" font-family="Arial Black, Arial" font-weight="900" font-size="110" fill="white" filter="url(#glow)">POINT CLUB</text>
  <text x="960" y="970" text-anchor="middle" font-family="Arial" font-size="38" fill="rgba(255,255,255,0.45)" letter-spacing="10">DRAW  &amp;  GUESS  •  MULTIPLAYER</text>

  <!-- Bottom badge -->
  <rect x="810" y="995" width="300" height="44" rx="22" fill="rgba(124,58,237,0.3)" stroke="rgba(124,58,237,0.6)" stroke-width="1.5"/>
  <text x="960" y="1022" text-anchor="middle" font-family="Arial" font-size="16" fill="#a78bfa" font-weight="bold">✦ FREE TO PLAY ✦</text>
</svg>
