<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <circle cx="150" cy="180" r="220" fill="#7c3aed" opacity="0.13"/>
  <circle cx="680" cy="650" r="240" fill="#e11d48" opacity="0.10"/>

  <!-- Canvas -->
  <rect x="60" y="48" width="680" height="520" rx="16" fill="white" opacity="0.97"/>

  <!-- Word hint -->
  <rect x="60" y="20" width="680" height="26" rx="6" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="140" y="38" font-family="Arial" font-size="10" fill="rgba(255,255,255,0.3)">Round 1/3</text>
  <text x="295" y="39" font-family="Arial Black" font-size="12" fill="white" letter-spacing="10">_ _ _ _ _</text>
  <text x="654" y="38" font-family="Arial" font-size="11" fill="#f59e0b" font-weight="bold">42s</text>

  <!-- Sun -->
  <circle cx="240" cy="270" r="68" fill="none" stroke="#f59e0b" stroke-width="8"/>
  <line x1="240" y1="182" x2="240" y2="162" stroke="#f59e0b" stroke-width="7" stroke-linecap="round"/>
  <line x1="240" y1="358" x2="240" y2="378" stroke="#f59e0b" stroke-width="7" stroke-linecap="round"/>
  <line x1="152" y1="270" x2="132" y2="270" stroke="#f59e0b" stroke-width="7" stroke-linecap="round"/>
  <line x1="328" y1="270" x2="348" y2="270" stroke="#f59e0b" stroke-width="7" stroke-linecap="round"/>
  <line x1="178" y1="206" x2="164" y2="192" stroke="#f59e0b" stroke-width="7" stroke-linecap="round"/>
  <line x1="302" y1="334" x2="316" y2="348" stroke="#f59e0b" stroke-width="7" stroke-linecap="round"/>
  <line x1="302" y1="206" x2="316" y2="192" stroke="#f59e0b" stroke-width="7" stroke-linecap="round"/>
  <line x1="178" y1="334" x2="164" y2="348" stroke="#f59e0b" stroke-width="7" stroke-linecap="round"/>
  <!-- Clouds -->
  <ellipse cx="192" cy="96" rx="44" ry="27" fill="#e5e7eb" opacity="0.85"/>
  <ellipse cx="230" cy="86" rx="34" ry="22" fill="#f3f4f6" opacity="0.9"/>
  <ellipse cx="162" cy="99" rx="27" ry="18" fill="#e5e7eb" opacity="0.8"/>

  <!-- House -->
  <polygon points="470,350 574,240 678,350" fill="#e11d48" opacity="0.9"/>
  <rect x="484" y="350" width="180" height="140" rx="3" fill="#7c3aed" opacity="0.9"/>
  <rect x="548" y="410" width="52" height="80" rx="5" fill="#1a1a2e"/>
  <rect x="498" y="370" width="36" height="36" rx="5" fill="#fbbf24"/>
  <rect x="618" y="370" width="36" height="36" rx="5" fill="#fbbf24"/>
  <!-- Ground -->
  <line x1="78" y1="490" x2="722" y2="490" stroke="#9ca3af" stroke-width="3" opacity="0.25"/>
  <!-- Pencil -->
  <g transform="translate(668,472) rotate(-30)">
    <rect x="-7" y="-48" width="14" height="58" rx="3" fill="#fbbf24"/>
    <polygon points="-7,10 7,10 0,24" fill="#1a1a2e"/>
    <rect x="-7" y="-58" width="14" height="12" rx="2" fill="#f87171"/>
  </g>

  <!-- Title -->
  <text x="400" y="628" text-anchor="middle" font-family="Arial Black" font-weight="900" font-size="82" fill="white" filter="url(#glow)">POINT CLUB</text>
  <text x="400" y="680" text-anchor="middle" font-family="Arial" font-size="24" fill="rgba(255,255,255,0.4)" letter-spacing="7">DRAW &amp; GUESS</text>

  <rect x="270" y="706" width="260" height="42" rx="21" fill="rgba(124,58,237,0.3)" stroke="rgba(124,58,237,0.6)" stroke-width="1.5"/>
  <text x="400" y="733" text-anchor="middle" font-family="Arial" font-size="15" fill="#a78bfa" font-weight="bold">✦ FREE TO PLAY ✦</text>
  <text x="400" y="772" text-anchor="middle" font-family="Arial" font-size="13" fill="rgba(255,255,255,0.2)">point-club.vercel.app</text>
</svg>
