<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#4c1d95"/>
    </linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e11d48"/>
      <stop offset="100%" style="stop-color:#9f1239"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="20" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Glow orbs -->
  <circle cx="200" cy="200" r="200" fill="#7c3aed" opacity="0.15"/>
  <circle cx="1080" cy="500" r="250" fill="#e11d48" opacity="0.12"/>
  <circle cx="640" cy="360" r="300" fill="#7c3aed" opacity="0.06"/>

  <!-- Canvas board (white drawing area) -->
  <rect x="340" y="140" width="600" height="400" rx="16" fill="white" opacity="0.97"/>
  <rect x="340" y="140" width="600" height="400" rx="16" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>

  <!-- Drawing on canvas - a simple sun/rainbow doodle -->
  <!-- Sun circle -->
  <circle cx="540" cy="260" r="55" fill="none" stroke="#f59e0b" stroke-width="7" stroke-linecap="round"/>
  <!-- Sun rays -->
  <line x1="540" y1="185" x2="540" y2="168" stroke="#f59e0b" stroke-width="6" stroke-linecap="round"/>
  <line x1="540" y1="335" x2="540" y2="352" stroke="#f59e0b" stroke-width="6" stroke-linecap="round"/>
  <line x1="465" y1="260" x2="448" y2="260" stroke="#f59e0b" stroke-width="6" stroke-linecap="round"/>
  <line x1="615" y1="260" x2="632" y2="260" stroke="#f59e0b" stroke-width="6" stroke-linecap="round"/>
  <line x1="487" y1="207" x2="475" y2="195" stroke="#f59e0b" stroke-width="6" stroke-linecap="round"/>
  <line x1="593" y1="313" x2="605" y2="325" stroke="#f59e0b" stroke-width="6" stroke-linecap="round"/>
  <line x1="593" y1="207" x2="605" y2="195" stroke="#f59e0b" stroke-width="6" stroke-linecap="round"/>
  <line x1="487" y1="313" x2="475" y2="325" stroke="#f59e0b" stroke-width="6" stroke-linecap="round"/>

  <!-- House -->
  <polygon points="720,320 800,240 880,320" fill="#e11d48" opacity="0.9"/>
  <rect x="730" y="320" width="140" height="110" rx="2" fill="#7c3aed" opacity="0.9"/>
  <rect x="785" y="365" width="40" height="65" rx="4" fill="#1a1a2e"/>
  <!-- Windows -->
  <rect x="745" y="340" width="28" height="28" rx="4" fill="#fbbf24"/>
  <rect x="867" y="340" width="28" height="28" rx="4" fill="#fbbf24"/>

  <!-- Ground line -->
  <line x1="370" y1="430" x2="910" y2="430" stroke="#6b7280" stroke-width="3" stroke-linecap="round" opacity="0.4"/>

  <!-- Clouds -->
  <ellipse cx="460" cy="195" rx="35" ry="22" fill="#e5e7eb" opacity="0.8"/>
  <ellipse cx="490" cy="188" rx="28" ry="18" fill="#f3f4f6" opacity="0.9"/>
  <ellipse cx="435" cy="197" rx="22" ry="15" fill="#e5e7eb" opacity="0.8"/>

  <!-- Pencil cursor on canvas -->
  <g transform="translate(830, 390) rotate(-30)">
    <rect x="-6" y="-40" width="12" height="50" rx="3" fill="#fbbf24"/>
    <polygon points="-6,10 6,10 0,22" fill="#1a1a2e"/>
    <rect x="-6" y="-46" width="12" height="8" rx="2" fill="#f87171"/>
  </g>

  <!-- Player avatars (left side) -->
  <g>
    <circle cx="90" cy="240" r="36" fill="#7c3aed"/>
    <text x="90" y="248" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="20" fill="white">G</text>
    <rect x="136" y="222" width="120" height="36" rx="8" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <text x="148" y="236" font-family="Arial" font-weight="bold" font-size="11" fill="rgba(255,255,255,0.8)">Guest_abc</text>
    <text x="148" y="251" font-family="Arial" font-size="10" fill="rgba(255,255,255,0.4)">350 pts</text>
  </g>
  <g>
    <circle cx="90" cy="310" r="36" fill="#e11d48"/>
    <text x="90" y="318" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="20" fill="white">S</text>
    <rect x="136" y="292" width="120" height="36" rx="8" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <text x="148" y="306" font-family="Arial" font-weight="bold" font-size="11" fill="rgba(255,255,255,0.8)">Shaurya ✏️</text>
    <text x="148" y="321" font-family="Arial" font-size="10" fill="rgba(255,255,255,0.4)">0 pts</text>
  </g>
  <g>
    <circle cx="90" cy="380" r="36" fill="#059669"/>
    <text x="90" y="388" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="20" fill="white">A</text>
    <rect x="136" y="362" width="120" height="36" rx="8" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <text x="148" y="376" font-family="Arial" font-weight="bold" font-size="11" fill="rgba(255,255,255,0.8)">Apex_Nova</text>
    <text x="148" y="391" font-family="Arial" font-size="10" fill="rgba(255,255,255,0.4)">200 pts ✓</text>
  </g>

  <!-- Chat bubbles (right side) -->
  <rect x="1010" y="220" width="210" height="44" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="1022" y="238" font-family="Arial" font-size="11" fill="rgba(255,255,255,0.5)">Guest_abc:</text>
  <text x="1022" y="254" font-family="Arial" font-size="12" fill="rgba(255,255,255,0.7)">is it a house? 🏠</text>

  <rect x="1010" y="276" width="210" height="44" rx="12" fill="rgba(16,185,129,0.15)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
  <text x="1022" y="294" font-family="Arial" font-size="11" fill="rgba(255,255,255,0.5)">Apex_Nova:</text>
  <text x="1022" y="310" font-family="Arial" font-weight="bold" font-size="12" fill="#34d399">✓ Guessed it! +120pts</text>

  <rect x="1010" y="332" width="210" height="44" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="1022" y="350" font-family="Arial" font-size="11" fill="rgba(255,255,255,0.5)">Guest_abc:</text>
  <text x="1022" y="366" font-family="Arial" font-size="12" fill="rgba(255,255,255,0.7)">no wait... sun?? ☀️</text>

  <!-- Word hint bar -->
  <rect x="340" y="100" width="600" height="34" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="430" y="122" font-family="Arial" font-size="11" fill="rgba(255,255,255,0.3)">Round 1/3</text>
  <!-- Word blanks -->
  <text x="560" y="122" font-family="Arial Black" font-size="15" fill="white" letter-spacing="8">_ _ _ _ _</text>
  <!-- Timer -->
  <text x="860" y="122" font-family="Arial" font-size="13" fill="#f59e0b" font-weight="bold">⏱ 42s</text>

  <!-- Timer bar -->
  <rect x="340" y="134" width="600" height="4" rx="2" fill="rgba(255,255,255,0.1)"/>
  <rect x="340" y="134" width="320" height="4" rx="2" fill="#f59e0b"/>

  <!-- Main title -->
  <text x="640" y="598" text-anchor="middle" font-family="Arial Black, Arial" font-weight="900" font-size="72" fill="white" filter="url(#glow)">POINT CLUB</text>
  <text x="640" y="648" text-anchor="middle" font-family="Arial" font-size="26" fill="rgba(255,255,255,0.5)" letter-spacing="6">DRAW  &amp;  GUESS</text>

  <!-- Decorative dots -->
  <circle cx="200" cy="620" r="4" fill="#7c3aed" opacity="0.6"/>
  <circle cx="220" cy="620" r="4" fill="#7c3aed" opacity="0.4"/>
  <circle cx="240" cy="620" r="4" fill="#7c3aed" opacity="0.2"/>
  <circle cx="1040" cy="620" r="4" fill="#e11d48" opacity="0.2"/>
  <circle cx="1060" cy="620" r="4" fill="#e11d48" opacity="0.4"/>
  <circle cx="1080" cy="620" r="4" fill="#e11d48" opacity="0.6"/>

  <!-- Multiplayer badge -->
  <rect x="540" y="666" width="200" height="32" rx="16" fill="rgba(124,58,237,0.3)" stroke="rgba(124,58,237,0.6)" stroke-width="1"/>
  <text x="640" y="687" text-anchor="middle" font-family="Arial" font-size="13" fill="#a78bfa" font-weight="bold">✦ MULTIPLAYER ✦</text>
</svg>
